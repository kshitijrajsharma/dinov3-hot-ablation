backbone: terratorch_dinov3_vitl16_lvd
hf_ckpt_repo: kshitijrajsharma/dinov3
hf_ckpt_file: dinov3_vitl16_pretrain_lvd1689m-8aa4cbdd.pth

img_size: 256
patch_size: 16
seg_out_indices: [5, 11, 17, 23]
decoder_channels: 256
head_dropout: 0.2

dataset_repo: hotosm/vhr-building-segmentation
data_root: data/hot_building
data_pct: 100.0
drop_null_images: true
boundary_width: 2
distance_clip: 15.0

batch_size: 32
eval_batch_size: 32
num_workers: 4
pin_memory: true
persistent_workers: true

lr: 2.22e-4
weight_decay: 0.0094
max_epochs: 60
early_stop_patience: 10
boundary_loss_weight: 0.43
distance_loss_weight: 0.52
tv_loss_weight: 0.0
onecycle_pct_start: 0.05
onecycle_div_factor: 25.0
onecycle_final_div_factor: 1.0e4
precision: bf16-mixed
seed: 42
grad_clip: 1.0

output_dir: outputs
run_name: dinov3l_v3

tile_window: 256
tile_stride: 224
tile_threshold: 0.5

hpo:
  enabled: false
  n_trials: 8
  data_pct: 10.0
  max_epochs: 8
  lr_range: [5.0e-5, 3.0e-4]
  weight_decay_range: [5.0e-3, 1.0e-1]
  boundary_loss_weight_range: [0.3, 1.0]
  distance_loss_weight_range: [0.3, 1.5]
  tv_loss_weight_range: [0.0, 0.1]
  storage: null
  study_name: dinov3_hot_hpo
